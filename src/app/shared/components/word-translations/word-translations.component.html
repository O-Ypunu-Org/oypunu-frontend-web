<div class="word-translations">
  <ng-container *ngIf="hasTranslations(); else noTranslations">

    <!-- Ligne par traduction (flat, comme mobile) -->
    <div
      *ngFor="let translation of word.translations; let i = index; let last = last"
      class="flex items-center gap-3 py-3"
      [class.border-b]="!last"
      [class.border-gray-700]="!last">

      <!-- Langue (style exemples de définition) -->
      <span class="text-xs text-gray-500 italic shrink-0 w-16 text-right">
        {{ getLanguageName(getTranslationKey(translation)) }}
      </span>

      <!-- Mot traduit cliquable (taille proportionnelle) -->
      <button
        type="button"
        (click)="navigateToTranslation(translation.translatedWord, getTranslationKey(translation))"
        class="px-3 py-1.5 bg-primary-900/40 border border-primary-700/50 rounded-lg text-primary-300 hover:text-primary-200 hover:bg-primary-900/60 transition-colors text-sm font-medium whitespace-nowrap">
        {{ translation.translatedWord | capitalize }}
      </button>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Bouton audio — affiché seulement si le mot cible a un fichier audio -->
      <button
        *ngIf="getTranslationTargetId(translation) && translationAudioMap.get(getTranslationTargetId(translation)!)"
        type="button"
        (click)="playTranslationAudio(translation, $event)"
        class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-primary-400 hover:bg-gray-700 transition-colors shrink-0"
        title="Écouter la prononciation">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" />
        </svg>
      </button>

      <!-- Niveau de confiance -->
      <span *ngIf="translation.confidence" class="text-xs font-semibold shrink-0 w-10 text-right"
        [class]="getConfidenceClass(translation.confidence)">
        {{ formatConfidence(translation.confidence) }}
      </span>

    </div>

  </ng-container>

  <!-- Aucune traduction -->
  <ng-template #noTranslations>
    <p class="text-sm text-gray-500 text-center py-4">Aucune traduction disponible.</p>
  </ng-template>
</div>
