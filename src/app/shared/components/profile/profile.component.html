<div class="flex items-center space-x-4">
  <!-- Profil -->
  <div class="relative profile-dropdown">
    <button class="profile-avatar flex items-center focus:outline-none cursor-pointer" (click)="toggleDropdown()">
      <div class="w-8 h-8 rounded-full overflow-hidden flex items-center justify-center bg-gray-700">
        <img *ngIf="currentUser?.profilePicture && !navbarAvatarError"
          [src]="currentUser!.profilePicture"
          [alt]="currentUser!.username"
          class="w-full h-full object-cover"
          (error)="navbarAvatarError = true" />
        <svg *ngIf="!currentUser?.profilePicture || navbarAvatarError"
          xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
    </button>

    <!-- Menu déroulant du profil -->
    <div *ngIf="isDropdownOpen"
      class="dropdown-menu absolute right-0 mt-2 w-48 bg-gray-800 rounded-md shadow-lg py-1 z-10">
      <a [routerLink]="['/profile']" routerLinkActive="bg-gray-700"
        class="dropdown-link block px-4 py-2 text-sm text-gray-200 hover:bg-gray-700">
        Mon profil
      </a>
      <button (click)="logout()"
        class="dropdown-link block w-full text-left px-4 py-2 text-sm text-gray-200 hover:bg-gray-700 cursor-pointer">
        Se déconnecter
      </button>
    </div>
  </div>
</div>
