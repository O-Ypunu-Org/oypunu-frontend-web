<div class="mb-6">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-xl font-bold text-white flex items-center gap-2">
      <svg class="w-5 h-5 text-[var(--oy-purple-600)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
      </svg>
      {{ isAdmin ? 'Gestion des langues' : 'Mes langues proposées' }}
    </h2>
    <button
      (click)="isAdmin ? onManage() : onPropose()"
      class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors
             bg-gray-700 hover:bg-gray-600 text-gray-200">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          [attr.d]="isAdmin ? 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' : 'M12 4v16m8-8H4'" />
      </svg>
      {{ isAdmin ? 'Gérer' : 'Proposer une langue' }}
    </button>
  </div>

  <!-- Chargement -->
  <div *ngIf="isLoading" class="flex items-center justify-center py-6">
    <div class="w-6 h-6 border-2 border-gray-600 border-t-[var(--oy-purple-600)] rounded-full animate-spin"></div>
  </div>

  <!-- Erreur -->
  <div *ngIf="error && !isLoading" class="text-red-400 text-sm py-2">{{ error }}</div>

  <!-- Liste -->
  <div *ngIf="!isLoading && !error && languages.length > 0"
    class="bg-gray-800 rounded-lg divide-y divide-gray-700">
    <div *ngFor="let lang of languages.slice(0, 5)"
      class="flex items-center gap-3 px-4 py-3">
      <div class="flex-1 min-w-0">
        <p class="text-white font-medium truncate">{{ lang.name }}</p>
        <p class="text-gray-400 text-xs mt-0.5">{{ lang.nativeName }}</p>
      </div>
      <span [class]="getStatusClass(lang)"
        class="px-2 py-1 rounded-md text-xs font-semibold whitespace-nowrap">
        {{ getStatusLabel(lang) }}
      </span>
      <button (click)="onEdit(lang)"
        class="flex-shrink-0 p-1.5 rounded bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Voir plus (admin) -->
  <button *ngIf="isAdmin && languages.length > 5"
    (click)="onManage()"
    class="mt-2 w-full text-center text-xs text-gray-400 hover:text-gray-200 py-2 transition-colors">
    Voir toutes les langues ({{ languages.length }}) →
  </button>

  <!-- Vide -->
  <div *ngIf="!isLoading && !error && languages.length === 0"
    class="text-center py-6 text-gray-500 text-sm bg-gray-800 rounded-lg">
    <p *ngIf="!isAdmin">Vous n'avez pas encore proposé de langue.</p>
    <p *ngIf="isAdmin">Aucune langue enregistrée.</p>
  </div>
</div>
