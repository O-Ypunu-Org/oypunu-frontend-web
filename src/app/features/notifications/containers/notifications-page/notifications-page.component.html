<div class="min-h-screen bg-gray-900 text-white">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <!-- En-tête -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl font-bold">Notifications</h1>
        <p *ngIf="unreadCount > 0" class="text-sm text-purple-400 mt-1">
          {{ unreadCount }} non lue{{ unreadCount > 1 ? 's' : '' }}
        </p>
      </div>
      <div class="flex gap-3">
        <!-- Filtre non-lues -->
        <button
          (click)="toggleFilter()"
          class="px-3 py-1.5 text-sm rounded-lg border transition-colors"
          [class.border-purple-500]="unreadOnly"
          [class.text-purple-400]="unreadOnly"
          [class.border-gray-600]="!unreadOnly"
          [class.text-gray-400]="!unreadOnly">
          {{ unreadOnly ? 'Toutes' : 'Non lues' }}
        </button>
        <!-- Tout marquer lu -->
        <button
          *ngIf="unreadCount > 0"
          (click)="markAllAsRead()"
          class="px-3 py-1.5 text-sm rounded-lg bg-purple-600 hover:bg-purple-700 transition-colors">
          Tout marquer lu
        </button>
      </div>
    </div>

    <!-- Chargement -->
    <div *ngIf="isLoading" class="flex justify-center py-12">
      <div class="w-8 h-8 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <!-- Vide -->
    <div *ngIf="!isLoading && notifications.length === 0"
      class="flex flex-col items-center justify-center py-20 text-gray-500">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      <p class="text-lg font-medium">Aucune notification</p>
      <p class="text-sm mt-1">Vous êtes à jour !</p>
    </div>

    <!-- Liste -->
    <div *ngIf="!isLoading && notifications.length > 0"
      class="space-y-2">
      <button
        *ngFor="let notif of notifications"
        (click)="onNotificationClick(notif)"
        class="w-full flex items-start gap-4 p-4 rounded-xl border text-left transition-all duration-200 hover:border-gray-600"
        [class.bg-gray-800]="!notif.isRead"
        [class.border-purple-800]="!notif.isRead"
        [class.bg-gray-850]="notif.isRead"
        [class.border-gray-700]="notif.isRead">
        <!-- Point non-lu -->
        <div class="mt-1.5 flex-shrink-0">
          <span *ngIf="!notif.isRead" class="block w-2.5 h-2.5 bg-purple-500 rounded-full"></span>
          <span *ngIf="notif.isRead" class="block w-2.5 h-2.5 rounded-full"></span>
        </div>
        <!-- Icône -->
        <span class="text-2xl flex-shrink-0">{{ getTypeIcon(notif.type) }}</span>
        <!-- Contenu -->
        <div class="flex-1 min-w-0">
          <p class="text-sm text-gray-100 leading-snug" [class.font-semibold]="!notif.isRead">
            {{ notif.message }}
          </p>
          <p *ngIf="notif.triggeredBy" class="text-xs text-gray-500 mt-0.5">
            Par &#64;{{ notif.triggeredBy.username }}
          </p>
          <p class="text-xs text-gray-500 mt-0.5">{{ getTimeAgo(notif.createdAt) }}</p>
        </div>
      </button>

      <!-- Charger plus -->
      <div *ngIf="hasMore" class="flex justify-center pt-4">
        <button (click)="loadMore()"
          class="px-6 py-2 text-sm text-gray-400 border border-gray-700 rounded-lg hover:border-gray-500 hover:text-gray-300 transition-colors">
          Charger plus
        </button>
      </div>
    </div>
  </div>
</div>
