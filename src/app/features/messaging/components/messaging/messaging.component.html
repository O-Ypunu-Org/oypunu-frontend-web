<div class="oy-messaging">

  <!-- ═══════════════ SIDEBAR GAUCHE ═══════════════ -->
  <aside class="oy-sidebar" [class.oy-sidebar--mobile-hidden]="selectedConversation">
    <app-conversations-list (conversationSelected)="onConversationSelected($event)">
    </app-conversations-list>
  </aside>

  <!-- ═══════════════ PANNEAU DE CHAT ═══════════════ -->
  <section class="oy-chat-panel" [class.oy-chat-panel--mobile-visible]="selectedConversation">

    <!-- Barre retour mobile -->
    <div class="oy-mobile-back" *ngIf="selectedConversation">
      <button class="oy-mobile-back__btn" (click)="selectedConversation = null">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M5 12l7 7M5 12l7-7"/>
        </svg>
      </button>
      <ng-container *ngIf="getOtherParticipant(selectedConversation) as other">
        <div class="oy-mobile-back__avatar">
          <img *ngIf="other.profilePicture" [src]="other.profilePicture" [alt]="other.username">
          <span *ngIf="!other.profilePicture">{{ (other.username || '?').charAt(0).toUpperCase() }}</span>
          <span class="oy-online-dot" *ngIf="isUserOnline(other.id)"></span>
        </div>
        <div class="oy-mobile-back__info">
          <span class="oy-mobile-back__name">{{ other.username }}</span>
          <span class="oy-mobile-back__status">{{ isUserOnline(other.id) ? 'En ligne' : 'Hors ligne' }}</span>
        </div>
      </ng-container>
    </div>

    <!-- Fenêtre de chat -->
    <app-chat-window *ngIf="selectedConversation" [conversation]="selectedConversation">
    </app-chat-window>

    <!-- État vide (desktop) -->
    <div *ngIf="!selectedConversation" class="oy-empty-state">
      <div class="oy-empty-state__icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
      </div>
      <h2 class="oy-empty-state__title">Vos messages</h2>
      <p class="oy-empty-state__text">Sélectionnez une conversation dans la liste pour commencer à discuter.</p>
    </div>

  </section>

</div>
