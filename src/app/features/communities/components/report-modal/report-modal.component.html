<div *ngIf="isOpen" class="fixed inset-0 z-50 flex items-center justify-center">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/60" (click)="onCancel()"></div>

  <!-- Panel -->
  <div class="relative bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-full max-w-md mx-4 p-6">
    <h2 class="text-lg font-semibold text-white mb-1">Signaler ce contenu</h2>
    <p class="text-sm text-gray-400 mb-5">Sélectionnez la raison du signalement</p>

    <div class="grid grid-cols-2 gap-2 mb-6">
      <button *ngFor="let reason of reasons"
        (click)="select(reason.id)"
        [class]="selectedReason === reason.id
          ? 'px-3 py-2.5 rounded-lg border text-sm font-medium border-purple-600 bg-purple-600/15 text-purple-300'
          : 'px-3 py-2.5 rounded-lg border text-sm border-gray-700 text-gray-300 hover:border-gray-500 hover:bg-gray-800 transition-colors'">
        {{ reason.label }}
      </button>
    </div>

    <div class="flex gap-3 justify-end">
      <button (click)="onCancel()"
        class="px-4 py-2 text-sm rounded-lg border border-gray-700 text-gray-300 hover:bg-gray-800 transition-colors">
        Annuler
      </button>
      <button (click)="onConfirm()"
        [disabled]="!selectedReason"
        class="px-4 py-2 text-sm rounded-lg bg-red-600 text-white hover:bg-red-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
        Signaler
      </button>
    </div>
  </div>
</div>
