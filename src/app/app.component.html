<app-header></app-header>

<main [class.messaging-layout]="isMessagingPage">
  <router-outlet></router-outlet>
</main>

<app-footer *ngIf="showFooter"></app-footer>

<!-- Conteneur de notifications -->
<app-toast-container></app-toast-container>

<!-- Dialog de confirmation global -->
<app-confirmation-modal
  *ngIf="(confirmState$ | async) as confirmState"
  [isVisible]="confirmState.isVisible"
  [config]="confirmState.config"
  (confirmed)="onConfirmDialogConfirmed()"
  (cancelled)="onConfirmDialogCancelled()">
</app-confirmation-modal>
